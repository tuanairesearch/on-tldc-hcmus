<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn tập Chương 4 – Ngôn ngữ và Giao tiếp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f3ef;--surface:#ffffff;--ink:#1d2330;--ink-soft:#5b6373;--line:#e6e3db;
    --brand:#147d7c;--brand-deep:#0f5f5e;--brand-tint:#e3f0ef;
    --t15:#4f78d8;--t15-bg:#eaf0fc;--t25:#d99320;--t25-bg:#fdf3df;--t35:#b1568f;--t35-bg:#fbeaf4;
    --ok:#1f9d62;--ok-bg:#e6f6ee;--ok-line:#9bd9ba;--no:#d24545;--no-bg:#fcebeb;--no-line:#f0b4b4;
    --shadow:0 1px 2px rgba(20,30,50,.04),0 8px 24px rgba(20,30,50,.06);--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:84px}
  .hero{background:linear-gradient(135deg,var(--brand-deep),var(--brand));color:#fff;padding:44px 22px 56px;position:relative;overflow:hidden}
  .hero-inner{max-width:820px;margin:0 auto;position:relative;z-index:2}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:.78rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;background:rgba(255,255,255,.16);padding:6px 13px;border-radius:99px;margin-bottom:16px}
  .hero h1{font-size:2rem;font-weight:800;line-height:1.18;letter-spacing:-.02em}
  .hero p{margin-top:10px;font-size:1.02rem;opacity:.92;max-width:600px}
  .bubbles{position:absolute;inset:0;z-index:1;opacity:.13}
  .bubbles span{position:absolute;border:2.5px solid #fff;border-radius:18px 18px 18px 4px}
  .bubbles span:nth-child(1){width:70px;height:48px;top:18px;right:34px}
  .bubbles span:nth-child(2){width:46px;height:32px;top:96px;right:120px}
  .bubbles span:nth-child(3){width:54px;height:38px;bottom:30px;right:60px;border-radius:18px 18px 4px 18px}
  .bubbles span:nth-child(4){width:40px;height:28px;bottom:80px;left:40px}
  .legend{max-width:820px;margin:-30px auto 0;padding:0 18px;position:relative;z-index:3;display:flex;flex-wrap:wrap;gap:10px}
  .legend .chip{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:.82rem;font-weight:500;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow);flex:1;min-width:150px}
  .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .dot.t15{background:var(--t15)}.dot.t25{background:var(--t25)}.dot.t35{background:var(--t35)}
  .legend .chip b{display:block;font-weight:700;font-size:.86rem;color:var(--ink)}
  .legend .chip small{color:var(--ink-soft);font-weight:500}
  .progress-wrap{position:sticky;top:0;z-index:40;background:rgba(244,243,239,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);margin-top:26px;padding:12px 0}
  .progress-inner{max-width:820px;margin:0 auto;padding:0 18px;display:flex;align-items:center;gap:16px}
  .bar{flex:1;height:9px;background:#e4e1d9;border-radius:99px;overflow:hidden}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--t25));border-radius:99px;transition:width .4s ease}
  .pstats{font-size:.85rem;font-weight:600;white-space:nowrap;color:var(--ink-soft)}
  .pstats b{color:var(--brand-deep)}
  .pscore{font-size:.85rem;font-weight:700;color:var(--ink);white-space:nowrap;background:var(--brand-tint);padding:4px 11px;border-radius:99px}
  .wrap{max-width:820px;margin:0 auto;padding:28px 18px}
  .section{margin-bottom:34px}
  .section-head{display:flex;align-items:center;gap:13px;margin-bottom:16px}
  .section-num{width:38px;height:38px;border-radius:11px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.05rem;flex-shrink:0}
  .section-head h2{font-size:1.18rem;font-weight:700;letter-spacing:-.01em;line-height:1.25}
  .section-head .cnt{font-size:.78rem;color:var(--ink-soft);font-weight:500}
  .q{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 20px 18px;margin-bottom:14px;box-shadow:var(--shadow);transition:opacity .25s ease,transform .25s ease}
  .q-top{display:flex;align-items:center;gap:10px;margin-bottom:13px}
  .badge{font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:8px;white-space:nowrap;letter-spacing:.01em}
  .badge.t15{color:var(--t15);background:var(--t15-bg)}.badge.t25{color:var(--t25);background:var(--t25-bg)}.badge.t35{color:var(--t35);background:var(--t35-bg)}
  .qno{font-size:.8rem;font-weight:600;color:var(--ink-soft);margin-left:auto}
  .q-text{font-size:1.02rem;font-weight:600;line-height:1.5;margin-bottom:14px}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;align-items:flex-start;gap:11px;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;font-size:.96rem;background:#fcfcfb;transition:border-color .15s,background .15s}
  .opt:hover:not(.locked){border-color:var(--brand);background:var(--brand-tint)}
  .opt .key{width:25px;height:25px;border-radius:7px;background:#eceae3;color:var(--ink-soft);font-weight:700;font-size:.82rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
  .opt .otext{flex:1;padding-top:1px}
  .opt.locked{cursor:default}
  .opt.chosen-correct{border-color:var(--ok-line);background:var(--ok-bg)}
  .opt.chosen-correct .key{background:var(--ok);color:#fff}
  .opt.chosen-wrong{border-color:var(--no-line);background:var(--no-bg)}
  .opt.chosen-wrong .key{background:var(--no);color:#fff}
  .opt.reveal-correct{border-color:var(--ok-line);background:var(--ok-bg)}
  .opt.reveal-correct .key{background:var(--ok);color:#fff}
  .opt .mark{margin-left:auto;font-weight:700;font-size:.9rem;align-self:center}
  .opt.chosen-correct .mark,.opt.reveal-correct .mark{color:var(--ok)}
  .opt.chosen-wrong .mark{color:var(--no)}
  .fb{margin-top:14px;border-radius:11px;padding:0 15px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;border-left:3px solid transparent}
  .fb.show{max-height:360px;padding:13px 15px}
  .fb.ok{background:var(--ok-bg);border-left-color:var(--ok)}
  .fb.no{background:var(--no-bg);border-left-color:var(--no)}
  .fb-head{font-weight:700;font-size:.86rem;display:flex;align-items:center;gap:7px;margin-bottom:4px}
  .fb.ok .fb-head{color:var(--ok)}.fb.no .fb-head{color:var(--no)}
  .fb-body{font-size:.92rem;color:var(--ink);line-height:1.55}
  .fb-page{display:inline-block;margin-top:7px;font-size:.78rem;font-weight:600;color:var(--ink-soft);background:rgba(0,0,0,.05);padding:3px 9px;border-radius:7px}
  .q.hidden-q{display:none}
  .results{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:26px 22px;box-shadow:var(--shadow);margin-top:10px;display:none}
  .results.show{display:block;animation:pop .4s ease}
  @keyframes pop{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .results h3{font-size:1.3rem;font-weight:800;text-align:center;margin-bottom:4px}
  .results .sub{text-align:center;color:var(--ink-soft);font-size:.92rem;margin-bottom:22px}
  .score-ring{display:flex;justify-content:center;margin-bottom:22px}
  .ring{position:relative;width:150px;height:150px}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .num b{font-size:2.1rem;font-weight:800;line-height:1}
  .ring .num span{font-size:.8rem;color:var(--ink-soft);font-weight:600;margin-top:3px}
  .breakdown{display:grid;gap:11px}
  .bd-row{display:flex;align-items:center;gap:12px;font-size:.9rem}
  .bd-row .lbl{font-weight:600;min-width:130px;display:flex;align-items:center;gap:8px}
  .bd-bar{flex:1;height:8px;background:#eceae3;border-radius:99px;overflow:hidden}
  .bd-bar>i{display:block;height:100%;border-radius:99px;transition:width .6s ease}
  .bd-val{font-weight:700;font-size:.85rem;min-width:48px;text-align:right}
  .bd-title{font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin:18px 0 4px}
  .actions{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:12px 18px;display:flex;gap:10px;justify-content:center}
  .btn{font-family:inherit;font-size:.92rem;font-weight:700;border:none;cursor:pointer;padding:12px 20px;border-radius:11px;transition:transform .12s,box-shadow .15s,background .15s}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--brand);color:#fff;box-shadow:0 4px 14px rgba(20,125,124,.32)}
  .btn-primary:hover{background:var(--brand-deep)}
  .btn-primary:disabled{background:#bdc4c4;box-shadow:none;cursor:not-allowed}
  .btn-ghost{background:var(--paper);color:var(--ink);border:1.5px solid var(--line)}
  .btn-ghost:hover{border-color:var(--brand);color:var(--brand)}
  .btn-warn{background:var(--t25-bg);color:#a8740f;border:1.5px solid #f0d49a}
  .btn-warn:hover{background:#fbe9c6}
  .btn.hide{display:none}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:.88rem;font-weight:500;opacity:0;pointer-events:none;transition:all .3s ease;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:560px){
    .hero h1{font-size:1.55rem}.hero{padding:34px 18px 50px}
    .q-text{font-size:.98rem}.opt{font-size:.92rem}
    .legend .chip{min-width:calc(50% - 5px)}
    .bd-row .lbl{min-width:104px;font-size:.84rem}
    .actions{flex-wrap:wrap}.btn{flex:1;min-width:130px;padding:11px 12px;font-size:.86rem}
  }
</style>
</head>
<body>
<header class="hero">
  <div class="bubbles"><span></span><span></span><span></span><span></span></div>
  <div class="hero-inner">
    <div class="eyebrow">Tâm lý học đại cương · Chương 4</div>
    <h1>Ngôn ngữ và Giao tiếp</h1>
    <p>Bộ câu hỏi tương tác theo định dạng đề thi: 3 mức điểm, chọn đáp án nhận phản hồi ngay kèm trang SGK.</p>
  </div>
</header>
<div class="legend">
  <div class="chip"><span class="dot t15"></span><span><b>0.15đ</b><small>Nhận biết</small></span></div>
  <div class="chip"><span class="dot t25"></span><span><b>0.25đ</b><small>Vận dụng</small></span></div>
  <div class="chip"><span class="dot t35"></span><span><b>0.35đ</b><small>Phân tích tình huống</small></span></div>
</div>
<div class="progress-wrap">
  <div class="progress-inner">
    <div class="pstats">Đã làm <b id="pDone">0</b>/<span id="pTotal">0</span></div>
    <div class="bar"><i id="pBar"></i></div>
    <div class="pscore" id="pScore">Đúng 0</div>
  </div>
</div>
<main class="wrap">
  <div id="quiz"></div>
  <section class="results" id="results">
    <h3 id="rTitle">Kết quả ôn tập</h3>
    <p class="sub" id="rSub"></p>
    <div class="score-ring">
      <div class="ring">
        <svg width="150" height="150">
          <circle cx="75" cy="75" r="66" fill="none" stroke="#eceae3" stroke-width="13"/>
          <circle id="rArc" cx="75" cy="75" r="66" fill="none" stroke="#147d7c" stroke-width="13" stroke-linecap="round" stroke-dasharray="414.7" stroke-dashoffset="414.7"/>
        </svg>
        <div class="num"><b id="rPct">0%</b><span id="rRatio">0/0</span></div>
      </div>
    </div>
    <div class="bd-title">Theo mức độ</div>
    <div class="breakdown" id="bdTier"></div>
    <div class="bd-title">Theo phần nội dung</div>
    <div class="breakdown" id="bdSection"></div>
  </section>
</main>
<div class="actions">
  <button class="btn btn-primary" id="btnResult" disabled>Xem kết quả</button>
  <button class="btn btn-warn hide" id="btnRedo">Làm lại câu sai</button>
  <button class="btn btn-ghost" id="btnReset">Làm lại từ đầu</button>
</div>
<div class="toast" id="toast"></div>
<script>
const DATA = [
  {title:"Vai trò của ngôn ngữ trong việc hình thành ý thức",questions:[
    {t:"15",q:'Theo Mác – Ăngghen, hai yếu tố cơ bản giúp "não vượn biến thành não người" là gì?',o:["Lao động và tư duy","Lao động và ngôn ngữ","Ngôn ngữ và ý thức","Tư duy và ý thức"],c:1,fb:'Mác – Ăngghen: "Trước hết là lao động, sau lao động, đồng thời với lao động là ngôn ngữ".',pg:"74"},
    {t:"15",q:"Động vật bậc cao có khả năng gì về mặt âm thanh?",o:["Có tiếng nói như con người","Báo hiệu bằng âm thanh nhưng không phải tiếng nói","Có ngôn ngữ viết","Hoàn toàn không phát ra âm thanh"],c:1,fb:"Động vật bậc cao báo hiệu bằng âm thanh, nhưng đó không phải là tiếng nói.",pg:"74"},
    {t:"15",q:"Nhờ có ngôn ngữ, hoạt động nhận thức của con người có khả năng nào sau đây?",o:["Tư duy trừu tượng, tư duy khái quát","Phản xạ không điều kiện","Cảm giác và tri giác đơn thuần","Bản năng sinh tồn"],c:0,fb:"Ngôn ngữ làm cho hoạt động nhận thức có khả năng tư duy trừu tượng, tư duy khái quát.",pg:"74"},
    {t:"25",q:'Phát biểu "não vượn biến thành não người" của Mác – Ăngghen nhấn mạnh điều gì về ngôn ngữ?',o:["Ngôn ngữ có sẵn từ khi sinh ra","Ngôn ngữ là nhân tố quan trọng trong quá trình hình thành ý thức con người","Ngôn ngữ chỉ là công cụ giao tiếp đơn thuần","Ngôn ngữ kém quan trọng hơn lao động"],c:1,fb:"Ngôn ngữ cùng với lao động là nhân tố quan trọng hình thành ý thức con người.",pg:"74"},
    {t:"25",q:'Một đứa trẻ tập gọi tên đồ vật, gọi "mẹ", "bố", "bà"... Điều này thể hiện vai trò nào của ngôn ngữ?',o:["Phát triển phản xạ không điều kiện","Giúp hoạt động nhận thức phát triển và hình thành các mối quan hệ","Thay thế hoàn toàn cho tư duy","Làm giảm khả năng nhận thức"],c:1,fb:"Ngôn ngữ làm hoạt động nhận thức phát triển và góp phần hình thành mối quan hệ người – người.",pg:"74"}
  ]},
  {title:"Giao tiếp – Định nghĩa và đặc điểm",questions:[
    {t:"15",q:"Giao tiếp được định nghĩa là gì?",o:["Sự tiếp xúc vật lý giữa các cá nhân","Sự tiếp xúc tâm lý giữa người với người","Quá trình trao đổi hàng hóa","Hoạt động lao động sản xuất"],c:1,fb:"Giao tiếp là sự tiếp xúc tâm lý giữa người với người, qua đó trao đổi thông tin, cảm xúc, ảnh hưởng lẫn nhau.",pg:"74"},
    {t:"15",q:"Đặc điểm nào sau đây KHÔNG phải là đặc điểm của giao tiếp?",o:["Giao tiếp luôn mang tính mục đích","Giao tiếp là sự tác động giữa chủ thể với chủ thể","Giao tiếp mang tính phổ biến","Giao tiếp chỉ diễn ra một chiều"],c:3,fb:"Giao tiếp là sự tác động song phương, đa chiều – không phải một chiều.",pg:"75"},
    {t:"15",q:'"Trong giao tiếp sẽ không có ai là khách thể hoàn toàn hay chủ thể hoàn toàn" thể hiện đặc điểm nào?',o:["Tính mục đích","Tác động giữa chủ thể với chủ thể","Tính phổ biến","Tính một chiều"],c:1,fb:"Đây là đặc điểm giao tiếp là sự tác động giữa chủ thể với chủ thể – song phương, đa chiều.",pg:"75"},
    {t:"25",q:"Vì sao nói giao tiếp mang tính phổ biến?",o:["Vì chỉ một số người mới cần giao tiếp","Vì mọi cá nhân đều có nhu cầu giao tiếp và giao tiếp có mặt trong hầu hết hoạt động sống","Vì giao tiếp chỉ xảy ra ở nơi công cộng","Vì giao tiếp chỉ phục vụ mục đích kinh tế"],c:1,fb:"Tính phổ biến: mọi người đều có nhu cầu giao tiếp, giao tiếp có mặt trong hầu hết hoạt động sống.",pg:"75"},
    {t:"35",q:"An và Bình tranh luận sôi nổi về một bộ phim, cả hai liên tục đưa ý kiến, phản hồi và bị ảnh hưởng bởi quan điểm của nhau. Tình huống này thể hiện rõ nhất đặc điểm nào của giao tiếp?",o:["Tính mục đích đơn thuần","Giao tiếp là sự tác động song phương, đa chiều giữa chủ thể với chủ thể","Giao tiếp một chiều từ An đến Bình","Giao tiếp không có sự ảnh hưởng lẫn nhau"],c:1,fb:"Cả hai đều là chủ thể tương tác tích cực, chủ động – tác động song phương, đa chiều.",pg:"75"}
  ]},
  {title:"Chức năng của giao tiếp",questions:[
    {t:"15",q:"Giao tiếp có mấy chức năng được nêu trong giáo trình?",o:["4","5","6","7"],c:2,fb:"6 chức năng: thông tin hai chiều; tổ chức – điều khiển – phối hợp hành động; điều khiển – điều chỉnh hành vi; xúc cảm; nhận thức – đánh giá lẫn nhau; giáo dục – phát triển nhân cách.",pg:"75–77"},
    {t:"15",q:"Chức năng thông tin hai chiều thể hiện qua hai mặt nào?",o:["Truyền tin và nhận tin","Nói và viết","Nghe và nhìn","Phát và xóa"],c:0,fb:"Chức năng thông tin hai chiều thể hiện qua truyền tin và nhận tin (message – feedback).",pg:"75"},
    {t:"15",q:"Chức năng nào dựa trên cơ sở xã hội, giúp một nhóm người phối hợp giải quyết nhiệm vụ chung?",o:["Chức năng xúc cảm","Chức năng tổ chức, điều khiển, phối hợp hành động","Chức năng nhận thức","Chức năng thông tin"],c:1,fb:"Chức năng tổ chức, điều khiển, phối hợp hành động giúp nhóm phối hợp đạt mục tiêu chung.",pg:"75"},
    {t:"15",q:"Giao tiếp giúp con người biểu lộ thái độ, tâm trạng và nhận biết xúc cảm của người khác. Đây là chức năng nào?",o:["Chức năng thông tin","Chức năng xúc cảm","Chức năng tổ chức","Chức năng giáo dục"],c:1,fb:"Chức năng xúc cảm – cũng là một con đường hình thành tình cảm của con người.",pg:"76"},
    {t:"15",q:'"Mỗi cá nhân trong giao tiếp vừa là nguồn phát thông tin vừa là nguồn thu thông tin" mô tả chức năng nào?',o:["Chức năng thông tin hai chiều","Chức năng xúc cảm","Chức năng điều chỉnh hành vi","Chức năng giáo dục"],c:0,fb:"Chức năng thông tin hai chiều – mỗi người vừa phát vừa thu thông tin.",pg:"75"},
    {t:"25",q:"Trong cuộc họp, trưởng nhóm thuyết phục các thành viên thay đổi cách làm việc, và các thành viên cũng tác động ngược lại đến quyết định của trưởng nhóm. Đây là chức năng nào?",o:["Chức năng xúc cảm","Chức năng điều khiển, điều chỉnh hành vi","Chức năng thông tin một chiều","Chức năng giáo dục"],c:1,fb:"Chức năng điều khiển, điều chỉnh hành vi – tác động đến động cơ, mục đích, quyết định và hành động của người khác.",pg:"76"},
    {t:"25",q:"Qua giao tiếp, một nhân viên mới tiếp thu các chuẩn mực đạo đức và kinh nghiệm từ đồng nghiệp, dần hoàn thiện bản thân. Đây là chức năng nào?",o:["Chức năng thông tin","Chức năng giáo dục và phát triển nhân cách","Chức năng xúc cảm","Chức năng tổ chức"],c:1,fb:"Chức năng giáo dục và phát triển nhân cách – đặc biệt các phẩm chất đạo đức được hình thành, phát triển.",pg:"77"},
    {t:"35",q:"Lan tham gia một câu lạc bộ tình nguyện. Qua giao tiếp, Lan vừa học kiến thức tự nhiên – xã hội, vừa nhìn lại và đánh giá đúng hơn về bản thân, đồng thời hiểu hơn tính cách từng người. Tình huống này thể hiện rõ nhất chức năng nào?",o:["Chức năng tổ chức, điều khiển","Chức năng nhận thức và đánh giá lẫn nhau","Chức năng xúc cảm","Chức năng thông tin một chiều"],c:1,fb:"Nhận thức tri thức tự nhiên – xã hội, tự nhận thức bản thân và nhận thức người khác = chức năng nhận thức và đánh giá lẫn nhau.",pg:"76"},
    {t:"35",q:"Một huấn luyện viên dùng lời động viên để khích lệ tinh thần, giúp các cầu thủ phấn chấn và gắn bó với đội hơn. Chức năng giao tiếp nổi bật ở đây là gì?",o:["Chức năng nhận thức","Chức năng xúc cảm","Chức năng tổ chức","Chức năng thông tin"],c:1,fb:"Thỏa mãn nhu cầu xúc cảm, tình cảm và hình thành tình cảm = chức năng xúc cảm.",pg:"76"}
  ]},
  {title:"Phát triển ngôn ngữ trong giao tiếp – Giọng nói",questions:[
    {t:"15",q:"Ngôn ngữ về cơ bản được chia thành hai loại nào?",o:["Ngôn ngữ nói và ngôn ngữ viết","Ngôn ngữ trang trọng và ngôn ngữ thân mật","Ngôn ngữ cơ thể và ngôn ngữ âm thanh","Ngôn ngữ chuẩn và ngôn ngữ địa phương"],c:0,fb:"Ngôn ngữ được chia thành ngôn ngữ nói và ngôn ngữ viết.",pg:"77"},
    {t:"15",q:"Theo các nhà ngôn ngữ học, ngôn ngữ có đặc điểm gì?",o:["Là một thứ tĩnh, không thay đổi","Phát triển và thay đổi mỗi ngày","Chỉ tồn tại dưới dạng viết","Không bao giờ có từ mới"],c:1,fb:"Ngôn ngữ không phải là một thứ tĩnh, nó phát triển và thay đổi mỗi ngày.",pg:"77"},
    {t:"15",q:"Yêu cầu quan trọng nhất đối với giao tiếp bằng lời nói là gì?",o:["Nói thật to","Sự rõ ràng về phát âm, nội dung và khả năng tiếp cận của việc trình bày ý nghĩ","Nói thật nhanh","Dùng nhiều từ chuyên môn"],c:1,fb:"Yêu cầu quan trọng nhất: sự rõ ràng về phát âm, nội dung và khả năng tiếp cận ý nghĩ.",pg:"78"},
    {t:"15",q:"Yếu tố nào của giọng nói giúp nhận biết giới tính, tuổi tác, quê quán của người nói?",o:["Âm lượng","Giọng nói","Tốc độ","Điểm dừng"],c:1,fb:"Qua giọng nói có thể nhận biết giới tính, tuổi tác, quê quán và cả trình độ học vấn.",pg:"78"},
    {t:"15",q:'"Âm vực phải chuẩn, tròn vành rõ chữ, không méo tiếng" là yêu cầu của yếu tố nào?',o:["Âm lượng","Phát âm","Độ cao","Tốc độ"],c:1,fb:"Phát âm: âm vực chuẩn, tròn vành rõ chữ, không méo tiếng, không nhầm lẫn giữa các âm.",pg:"78"},
    {t:"25",q:"Trong giao tiếp, tốc độ nói nên được điều chỉnh dựa vào yếu tố nào?",o:["Phụ thuộc hoàn toàn vào người nghe","Càng nhanh càng tốt","Phụ thuộc vào người nói","Cố định không đổi"],c:0,fb:"Tốc độ: trong khi giao tiếp, tốc độ hoàn toàn phụ thuộc vào người nghe.",pg:"78"},
    {t:"25",q:"Điểm nhấn trong giọng nói gồm hai cách nào?",o:["Độ (kéo dài âm lượng) và cường độ (tập trung năng lượng vào từ ngữ)","Cao và thấp","Nhanh và chậm","To và nhỏ"],c:0,fb:"Điểm nhấn: một là độ (kéo dài âm lượng), hai là cường độ (tập trung năng lượng vào một từ một cách mạnh mẽ, dứt khoát).",pg:"78"},
    {t:"25",q:'Câu "Đừng nói tất cả những gì bạn biết" muốn nhấn mạnh điều gì trong nghệ thuật giao tiếp?',o:["Nên giấu kiến thức của mình","Lắng nghe quan trọng hơn, bên cạnh kỹ năng nói","Không nên nói chuyện với ai","Chỉ nên nói những điều dễ"],c:1,fb:"Lắng nghe mới là yếu tố quyết định thành công của cuộc giao tiếp, còn quan trọng hơn cả việc nói.",pg:"79"},
    {t:"25",q:"Theo giáo trình, nghệ thuật giao tiếp để thành công phải xuất phát từ đâu?",o:["Sự khôn khéo, lươn lẹo","Sự chân thành, tử tế và phẩm chất lương thiện","Khả năng nói nhiều","Việc đạt được lợi ích cá nhân"],c:1,fb:"Nghệ thuật giao tiếp để thành công phải xuất phát từ sự chân thành, tử tế và phẩm chất lương thiện.",pg:"80"},
    {t:"35",q:"Khi đang thuyết trình, Minh nhận thấy người nghe có biểu hiện không thích chủ đề nhưng không nói ra. Theo nghệ thuật giao tiếp, Minh nên làm gì?",o:["Tiếp tục nói thật to chủ đề đó","Quan sát, hiểu ngôn ngữ cơ thể để ngưng hoặc chuyển hướng chủ đề","Phớt lờ và nói nhanh hơn","Yêu cầu người nghe phải tập trung"],c:1,fb:"Phải nắm bắt tâm lý đối phương, hiểu ngôn ngữ cơ thể để có sự tương tác phù hợp.",pg:"79"}
  ]},
  {title:"Phi ngôn từ trong giao tiếp",questions:[
    {t:"15",q:"Theo nghiên cứu, yếu tố ngôn ngữ tác động đến người nghe bao nhiêu phần trăm?",o:["7%","38%","55%","83%"],c:0,fb:"Quy tắc 7 – 38 – 55: ngôn ngữ 7%, giọng điệu 38%, phi ngôn từ 55%.",pg:"80"},
    {t:"15",q:"Yếu tố giọng điệu chiếm bao nhiêu phần trăm trong việc tác động đến người nghe?",o:["7%","38%","55%","25%"],c:1,fb:"Giọng điệu chiếm 38%.",pg:"80"},
    {t:"15",q:"Yếu tố phi ngôn từ chiếm bao nhiêu phần trăm trong việc tác động đến người nghe?",o:["7%","38%","55%","100%"],c:2,fb:"Phi ngôn từ chiếm 55% – là yếu tố quan trọng nhất.",pg:"80"},
    {t:"15",q:"Giao tiếp phi ngôn từ là giao tiếp thông qua những yếu tố nào?",o:["Tiếng nói và chữ viết","Cử chỉ, hành động cơ thể, nét mặt, điệu bộ, khoảng cách giao tiếp","Chỉ qua lời nói","Chỉ qua văn bản"],c:1,fb:"Phi ngôn từ: cử chỉ, hành động của cơ thể, nét mặt, điệu bộ, khoảng cách giao tiếp (theo Charles Robert Darwin).",pg:"80"},
    {t:"15",q:"Nét mặt có thể biểu hiện mấy cảm xúc cơ bản?",o:["4","5","6","8"],c:2,fb:"6 cảm xúc: vui, buồn, ngạc nhiên, sợ hãi, tức giận, căm ghét.",pg:"84"},
    {t:"15",q:"Sáu cảm xúc cơ bản biểu hiện trên nét mặt gồm những cảm xúc nào?",o:["Vui, buồn, ngạc nhiên, sợ hãi, tức giận, căm ghét","Vui, buồn, yêu, ghét, lo, sợ","Hạnh phúc, đau khổ, tức giận, vui, buồn, chán","Yêu, ghét, vui, buồn, giận, hờn"],c:0,fb:"6 cảm xúc cơ bản trên nét mặt: vui, buồn, ngạc nhiên, sợ hãi, tức giận, căm ghét.",pg:"84"},
    {t:"15",q:"Trong giao tiếp, đôi mắt có thể chuyển tải lượng thông tin lớn nhất là bao nhiêu phần trăm?",o:["55%","83%","38%","11%"],c:1,fb:"Đôi mắt chuyển tải lượng thông tin lớn nhất 83% và có sức truyền cảm lớn nhất.",pg:"83"},
    {t:"15",q:"Theo giáo trình, lượng thông tin thu nhận qua tai là bao nhiêu phần trăm?",o:["83%","55%","11%","38%"],c:2,fb:"Thông tin qua mắt là 83%, qua tai là 11%.",pg:"85"},
    {t:"15",q:"Dây thần kinh từ mắt lên não nhiều gấp bao nhiêu lần dây thần kinh từ tai lên não?",o:["10 lần","25 lần","50 lần","100 lần"],c:1,fb:"Dây thần kinh từ mắt lên não nhiều gấp 25 lần dây thần kinh từ tai lên não.",pg:"85"},
    {t:"15",q:"Theo giáo trình, đôi mắt được ví là gì?",o:['"Cửa sổ tâm hồn"','"Tấm gương cuộc đời"','"Cánh cửa trí tuệ"','"Ngọn đèn soi sáng"'],c:0,fb:'Đôi mắt là "cửa sổ tâm hồn", là yếu tố bộc lộ rõ nhất cảm xúc của con người.',pg:"83"},
    {t:"15",q:"Nguyên tắc để tay khi thuyết trình và giao tiếp là gì?",o:["Để tay trong khoảng từ trên thắt lưng và dưới cằm","Luôn để tay trong túi","Khoanh tay trước ngực","Để tay sau lưng"],c:0,fb:"Nguyên tắc: luôn để tay trong khoảng từ trên thắt lưng và dưới cằm.",pg:"85"},
    {t:"15",q:"Bí quyết của dáng điệu uyển chuyển, năng động khi đứng là gì?",o:["Đứng thẳng đều hai chân","Đứng trụ lên chân trước và dồn 80% trọng lượng cơ thể vào chân trụ","Ngồi xuống ghế","Dồn trọng lượng ra phía sau"],c:1,fb:"Đứng trụ lên chân trước và dồn 80% trọng lượng cơ thể vào chân trụ.",pg:"82"},
    {t:"15",q:"Khoảng cách giao tiếp ở mức THÂN THIỆN được quy định là bao nhiêu?",o:["< 1m","< 1.5m","< 4m","> 4m"],c:0,fb:"Thân thiện: < 1m.",pg:"86"},
    {t:"15",q:"Khoảng cách giao tiếp ở mức RIÊNG TƯ được quy định là bao nhiêu?",o:["< 1m","< 1.5m","< 4m","> 4m"],c:1,fb:"Riêng tư: < 1.5m.",pg:"86"},
    {t:"15",q:"Khoảng cách giao tiếp ở mức XÃ GIAO được quy định là bao nhiêu?",o:["< 1m","< 1.5m","< 4m","> 4m"],c:2,fb:"Xã giao: < 4m.",pg:"86"},
    {t:"15",q:"Khoảng cách giao tiếp ở mức CÔNG CỘNG được quy định là bao nhiêu?",o:["< 1m","< 1.5m","< 4m","> 4m"],c:3,fb:"Công cộng: > 4m.",pg:"86"},
    {t:"25",q:"Đặc điểm nào sau đây KHÔNG đúng về giao tiếp phi ngôn từ?",o:["Luôn có giá trị giao tiếp cao","Mang tính đa kênh","Là diễn tả liên tục","Chỉ thể hiện qua một kênh duy nhất"],c:3,fb:"Phi ngôn từ mang tính đa kênh (nhìn, nghe, cảm nhận, ngửi, nếm cùng lúc) – không phải một kênh duy nhất.",pg:"81"},
    {t:"25",q:'Vì sao nói giao tiếp phi ngôn từ "là diễn tả liên tục"?',o:["Vì nó kết thúc ngay khi lời nói kết thúc","Vì giao tiếp cơ thể kéo dài cho tới khi người giao tiếp còn trong tầm mắt","Vì nó chỉ xảy ra một lần","Vì nó không bao giờ thay đổi"],c:1,fb:"Khác với lời nói (kết thúc khi âm thanh kết thúc), giao tiếp cơ thể kéo dài cho tới khi đối phương còn trong tầm mắt của bạn.",pg:"81"},
    {t:"25",q:"Sáu trạng thái tâm lý chung của con người ở mọi nền văn hóa gồm những trạng thái nào?",o:["Hạnh phúc, buồn khổ, giận dữ, sợ hãi, ghét, ngạc nhiên","Vui, buồn, yêu, ghét, hờn, giận","Hạnh phúc, đau khổ, lo âu, sợ hãi, vui, buồn","Yêu, ghét, vui, buồn, ngạc nhiên, chán"],c:0,fb:"6 trạng thái tâm lý chung ở mọi nền văn hóa: hạnh phúc, buồn khổ, giận dữ, sợ hãi, ghét, ngạc nhiên.",pg:"81"},
    {t:"25",q:'Vì sao phi ngôn từ "chịu ảnh hưởng của văn hóa"?',o:["Vì mọi nền văn hóa đều giống nhau","Vì hành vi, cử chỉ phù hợp với địa phương này nhưng có thể không phù hợp ở nơi khác","Vì phi ngôn từ không liên quan đến văn hóa","Vì cử chỉ luôn có nghĩa giống nhau khắp nơi"],c:1,fb:"Hành vi, cử chỉ phù hợp với địa phương này nhưng ngược lại ở nơi khác.",pg:"81"},
    {t:"25",q:"Cách di chuyển đơn giản khi thuyết trình được mô tả là gì?",o:["Đứng yên một chỗ","Di chuyển theo hình tam giác, đảo sang hai góc hội trường","Đi vòng tròn liên tục","Chạy quanh hội trường"],c:1,fb:"Di chuyển theo hình tam giác, đảo sang hai góc, lùi lại / tiến lên để tạo tương tác với khán giả.",pg:"85"},
    {t:"25",q:"Theo giáo trình, khuôn mặt được xem là nguồn thông tin như thế nào để biểu đạt tình cảm, thái độ và tính cách?",o:["Không quan trọng","Nguồn thông tin quan trọng nhất","Nguồn thông tin thứ yếu","Không liên quan đến tính cách"],c:1,fb:"Khuôn mặt là nguồn thông tin quan trọng nhất để biểu đạt tình cảm, thái độ và tính cách.",pg:"84"},
    {t:"25",q:"Nụ cười được giáo trình ví như là gì trong giao tiếp?",o:["Vũ khí","Trang sức trong giao tiếp","Rào cản","Công cụ lao động"],c:1,fb:"Nụ cười được xem là trang sức trong giao tiếp, một dấu hiệu mạnh mẽ giúp truyền tải sự vui vẻ thân thiện.",pg:"84"},
    {t:"25",q:"Dấu hiệu nào cho thấy một người không thoải mái khi bị xâm phạm khoảng không gian cá nhân?",o:["Đu đưa, móc chân, ngoáy tay, nhìn chằm chằm","Ngồi yên thư giãn","Mỉm cười tươi","Bắt tay thân thiện"],c:0,fb:"Dấu hiệu không thoải mái khi bị xâm phạm không gian: đu đưa, móc chân, ngoáy tay, quấn lấy, nhìn chằm chằm...",pg:"86"},
    {t:"25",q:'"Dáng chững chạc thì giọng nói chững chạc, dáng lỏng lẻo thì giọng nói lỏng lẻo" minh họa cho chức năng nào của phi ngôn từ?',o:["Chức năng điều tiết","Chức năng thông tin","Chức năng giải trí","Chức năng xã giao"],c:0,fb:"Phi ngôn từ có chức năng điều tiết – cơ thể là một thể thống nhất.",pg:"81"},
    {t:"25",q:"Khi di chuyển lúc thuyết trình, tốc độ bước chân có mối liên hệ như thế nào với giọng nói?",o:["Không liên quan","Bước mạnh mẽ thì giọng nói nhanh mạnh; bước nhẹ nhàng thì giọng nói khoan thai","Bước càng nhanh giọng càng chậm","Tốc độ bước luôn cố định"],c:1,fb:"Tốc độ bước giống giọng nói: bước mạnh → giọng mạnh; bước nhẹ → giọng nhẹ nhàng, khoan thai.",pg:"85"},
    {t:"35",q:"Khi đi phỏng vấn xin việc, Hùng chọn trang phục lịch sự, phù hợp với vị trí ứng tuyển. Theo giáo trình, trang phục đóng vai trò gì trong tình huống này?",o:["Không có ý nghĩa gì","Là ấn tượng đầu tiên, nhân tố quan trọng trong việc lấy lòng đối phương","Chỉ thể hiện sở thích cá nhân","Làm giảm sự chuyên nghiệp"],c:1,fb:"Trang phục là ấn tượng đầu tiên khi ra mắt nhà tuyển dụng, phản ánh nghề nghiệp – địa vị và tạo niềm tin.",pg:"83"},
    {t:"35",q:"Trong một buổi tiệc, Nam đứng nói chuyện với một người vừa quen ở khoảng cách khoảng 3m, vừa đủ một tầm bắt tay. Theo lý thuyết khoảng cách, đây là khoảng cách nào?",o:["Thân thiện","Riêng tư","Xã giao","Công cộng"],c:2,fb:"Người mới quen, khoảng 3m (< 4m), vừa một tầm bắt tay = khoảng cách xã giao.",pg:"86"},
    {t:"35",q:"Khi nói chuyện với người yêu mà giữ khoảng cách quá xa (ví dụ 2m), điều gì sẽ xảy ra theo giáo trình?",o:["Tạo cảm giác thân mật hơn","Tạo nên sự xa cách trong mối quan hệ","Không ảnh hưởng gì","Thể hiện sự tôn trọng"],c:1,fb:"Với người yêu, người thân mà khoảng cách quá xa thì tạo nên sự xa cách.",pg:"86"},
    {t:"35",q:"Trong buổi thuyết trình, cô giáo mở đầu bằng việc vẫy tay chào, nở nụ cười tươi và di chuyển linh hoạt thay vì đứng yên đọc bài đều đều. Điều này thể hiện đặc điểm nào của giao tiếp phi ngôn từ?",o:["Phi ngôn từ chuyển tải thông điệp không rõ ràng","Phi ngôn từ luôn có giá trị giao tiếp cao","Phi ngôn từ không quan trọng","Phi ngôn từ chỉ gây mất tập trung"],c:1,fb:"Phi ngôn từ luôn có giá trị giao tiếp cao – cử chỉ, nụ cười làm buổi thuyết trình khác hẳn so với đọc bài đều đều.",pg:"80"},
    {t:"35",q:"Khi giao tiếp, Lan quan sát thấy đối phương chạm tay vào cổ tay áo và liên tục nhìn đồng hồ. Theo gợi ý về ngôn ngữ cơ thể trong giáo trình, cử chỉ này có thể cho thấy điều gì?",o:["Đối phương đang rất vui vẻ","Đối phương đang tự làm dịu đi tâm trạng lo lắng","Đối phương hoàn toàn thư giãn","Đối phương chắc chắn đang nói dối"],c:1,fb:"Chạm vào cổ tay áo hay đồng hồ: đang tự làm dịu đi tâm trạng lo lắng.",pg:"82"}
  ]}
];

const TIER_LABEL={"15":"0.15đ · Nhận biết","25":"0.25đ · Vận dụng","35":"0.35đ · Phân tích"};
const TIER_COLOR={"15":"#4f78d8","25":"#d99320","35":"#b1568f"};
let TOTAL=0; DATA.forEach(s=>TOTAL+=s.questions.length);
const state={};
const quizEl=document.getElementById('quiz');
const toastEl=document.getElementById('toast');

function build(){
  quizEl.innerHTML='';
  let g=0;
  DATA.forEach((sec,si)=>{
    const secDiv=document.createElement('section');
    secDiv.className='section';
    secDiv.innerHTML='<div class="section-head"><div class="section-num">'+(si+1)+'</div>'+
      '<div><h2>'+sec.title+'</h2><div class="cnt">'+sec.questions.length+' câu</div></div></div>';
    sec.questions.forEach((q,qi)=>{
      g++;
      const key=si+'-'+qi;
      const card=document.createElement('div');
      card.className='q';card.id='q-'+key;card.dataset.key=key;
      const opts=q.o.map((opt,oi)=>'<div class="opt" data-key="'+key+'" data-oi="'+oi+'">'+
        '<span class="key">'+String.fromCharCode(65+oi)+'</span>'+
        '<span class="otext">'+opt+'</span><span class="mark"></span></div>').join('');
      card.innerHTML='<div class="q-top"><span class="badge t'+q.t+'">'+TIER_LABEL[q.t]+'</span>'+
        '<span class="qno">Câu '+g+'</span></div>'+
        '<div class="q-text">'+q.q+'</div>'+
        '<div class="opts">'+opts+'</div>'+
        '<div class="fb" id="fb-'+key+'"><div class="fb-head"></div>'+
        '<div class="fb-body">'+q.fb+'<br><span class="fb-page">📖 SGK trang '+q.pg+'</span></div></div>';
      secDiv.appendChild(card);
    });
    quizEl.appendChild(secDiv);
  });
  document.getElementById('pTotal').textContent=TOTAL;
  bindOpts();updateProgress();
}

function bindOpts(){
  document.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{
      const key=el.dataset.key;
      if(state[key]&&state[key].answered)return;
      const oi=parseInt(el.dataset.oi);
      const p=key.split('-').map(Number),si=p[0],qi=p[1];
      const q=DATA[si].questions[qi];
      const correct=oi===q.c;
      state[key]={answered:true,correct:correct,chosen:oi};
      const card=document.getElementById('q-'+key);
      card.querySelectorAll('.opt').forEach((o,idx)=>{
        o.classList.add('locked');
        if(idx===q.c){o.classList.add(correct&&idx===oi?'chosen-correct':'reveal-correct');o.querySelector('.mark').textContent='✓';}
        if(idx===oi&&!correct){o.classList.add('chosen-wrong');o.querySelector('.mark').textContent='✕';}
      });
      const fb=document.getElementById('fb-'+key);
      fb.classList.add('show',correct?'ok':'no');
      fb.querySelector('.fb-head').textContent=correct?'✓ Chính xác':'✕ Chưa đúng';
      updateProgress();
    });
  });
}

function updateProgress(){
  const done=Object.keys(state).filter(k=>state[k].answered).length;
  const right=Object.keys(state).filter(k=>state[k].correct).length;
  document.getElementById('pDone').textContent=done;
  document.getElementById('pScore').textContent='Đúng '+right;
  document.getElementById('pBar').style.width=(done/TOTAL*100)+'%';
  const btn=document.getElementById('btnResult');
  btn.disabled=done===0;
  btn.textContent=done===TOTAL?'Xem kết quả 🎉':'Xem kết quả ('+done+'/'+TOTAL+')';
}

function showToast(msg){
  toastEl.textContent=msg;toastEl.classList.add('show');
  setTimeout(()=>toastEl.classList.remove('show'),2200);
}

function showResults(){
  const done=Object.keys(state).filter(k=>state[k].answered).length;
  const right=Object.keys(state).filter(k=>state[k].correct).length;
  const pct=done?Math.round(right/done*100):0;
  document.getElementById('rPct').textContent=pct+'%';
  document.getElementById('rRatio').textContent=right+'/'+done;
  const circ=414.7;
  document.getElementById('rArc').style.strokeDashoffset=(circ-circ*pct/100);
  document.getElementById('rArc').style.stroke=pct>=80?'#1f9d62':pct>=50?'#d99320':'#d24545';
  let msg;
  if(done<TOTAL)msg='Bạn đã làm '+done+'/'+TOTAL+' câu. Hoàn thành nốt để có đánh giá đầy đủ nhé!';
  else if(pct>=90)msg='Xuất sắc! Bạn nắm rất chắc Chương 4. 🌟';
  else if(pct>=75)msg='Tốt! Chỉ cần ôn lại vài chỗ còn nhầm.';
  else if(pct>=50)msg='Khá ổn — nên xem kỹ phần phản hồi các câu sai.';
  else msg='Cần ôn lại kỹ hơn. Hãy đọc phản hồi và làm lại câu sai.';
  document.getElementById('rSub').textContent=msg;
  const tiers={"15":[0,0],"25":[0,0],"35":[0,0]};
  const secs=DATA.map(()=>[0,0]);
  Object.keys(state).forEach(k=>{
    const p=k.split('-').map(Number),si=p[0],qi=p[1];
    const q=DATA[si].questions[qi];
    tiers[q.t][1]++;if(state[k].correct)tiers[q.t][0]++;
    secs[si][1]++;if(state[k].correct)secs[si][0]++;
  });
  let th='';
  Object.keys(tiers).forEach(t=>{
    const c=tiers[t][0],tt=tiers[t][1];if(tt===0)return;
    const pp=Math.round(c/tt*100);
    th+='<div class="bd-row"><span class="lbl"><span class="dot t'+t+'"></span>'+TIER_LABEL[t]+'</span>'+
      '<span class="bd-bar"><i style="width:'+pp+'%;background:'+TIER_COLOR[t]+'"></i></span>'+
      '<span class="bd-val">'+c+'/'+tt+'</span></div>';
  });
  document.getElementById('bdTier').innerHTML=th||'<div style="color:#8a8f9c;font-size:.88rem">Chưa có dữ liệu.</div>';
  let sh='';
  secs.forEach((s,i)=>{
    const c=s[0],tt=s[1];if(tt===0)return;
    const pp=Math.round(c/tt*100);
    const col=pp>=80?'#1f9d62':pp>=50?'#d99320':'#d24545';
    sh+='<div class="bd-row"><span class="lbl">'+(i+1)+'. '+DATA[i].title.split('–')[0].trim()+'</span>'+
      '<span class="bd-bar"><i style="width:'+pp+'%;background:'+col+'"></i></span>'+
      '<span class="bd-val">'+c+'/'+tt+'</span></div>';
  });
  document.getElementById('bdSection').innerHTML=sh||'<div style="color:#8a8f9c;font-size:.88rem">Chưa có dữ liệu.</div>';
  const res=document.getElementById('results');
  res.classList.add('show');res.scrollIntoView({behavior:'smooth'});
  const wrong=Object.keys(state).filter(k=>state[k].answered&&!state[k].correct).length;
  document.getElementById('btnRedo').classList.toggle('hide',wrong===0);
}

function redoWrong(){
  const wrongKeys=Object.keys(state).filter(k=>state[k].answered&&!state[k].correct);
  if(wrongKeys.length===0){showToast('Không có câu nào sai 🎉');return;}
  document.getElementById('results').classList.remove('show');
  document.querySelectorAll('.q').forEach(card=>{
    const key=card.dataset.key;
    if(wrongKeys.indexOf(key)>-1){
      card.classList.remove('hidden-q');
      delete state[key];
      card.querySelectorAll('.opt').forEach(o=>{o.className='opt';o.querySelector('.mark').textContent='';});
      document.getElementById('fb-'+key).className='fb';
    }else{card.classList.add('hidden-q');}
  });
  document.querySelectorAll('.section').forEach(sec=>{
    const vis=Array.prototype.slice.call(sec.querySelectorAll('.q')).some(c=>!c.classList.contains('hidden-q'));
    sec.style.display=vis?'':'none';
  });
  document.getElementById('btnRedo').classList.add('hide');
  updateProgress();
  showToast('Làm lại '+wrongKeys.length+' câu sai. Cố lên! 💪');
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetAll(){
  for(const k in state)delete state[k];
  document.getElementById('results').classList.remove('show');
  document.getElementById('btnRedo').classList.add('hide');
  document.querySelectorAll('.section').forEach(s=>s.style.display='');
  build();
  window.scrollTo({top:0,behavior:'smooth'});
  showToast('Đã làm mới. Bắt đầu lại nào! ✨');
}

document.getElementById('btnResult').addEventListener('click',showResults);
document.getElementById('btnRedo').addEventListener('click',redoWrong);
document.getElementById('btnReset').addEventListener('click',resetAll);

build();
</script>
</body>
</html>
