 {s:"⭐ Phân loại hiện tượng tâm lý", q:"Tình huống: Hoa nổi tiếng là người kiên trì, có nghị lực, luôn trung thực. Đây là mô tả về?", o:["Một quá trình tâm lý","Một trạng thái tâm lý","Một thuộc tính tâm lý (tính cách)","Một cảm xúc nhất thời"], c:2, e:"Những nét bền vững, ổn định tạo nên nhân cách → thuộc tính tâm lý (tính cách)."},
 {s:"⭐ Phân loại hiện tượng tâm lý", q:"Tình huống: Vừa nghe tin trúng học bổng, An reo lên vui sướng trong giây lát. \"Vui sướng\" lúc đó là?", o:["Quá trình cảm xúc (thuộc quá trình tâm lý)","Trạng thái tâm lý","Thuộc tính tâm lý","Năng lực"], c:0, e:"Cảm xúc xuất hiện tức thời, ngắn, mở đầu–kết thúc rõ → quá trình cảm xúc. (Khác với tâm trạng vui kéo dài = trạng thái.)"},
 {s:"⭐ Phân loại hiện tượng tâm lý", q:"Tình huống: Bình có khả năng tính nhẩm rất nhanh và chính xác. \"Khả năng tính nhẩm\" của Bình là?", o:["Quá trình tâm lý","Trạng thái tâm lý","Thuộc tính tâm lý (năng lực)","Quá trình nhận thức"], c:2, e:"Năng lực là một trong bốn thuộc tính tâm lý cá nhân."},
 {s:"⭐ Phân loại hiện tượng tâm lý", q:"Tình huống: Trong lúc làm bài, Lan tập trung cao độ, gạt mọi tiếng ồn xung quanh. Trạng thái \"tập trung\" này thuộc loại nào?", o:["Quá trình tâm lý","Trạng thái tâm lý","Thuộc tính tâm lý","Quá trình cảm xúc"], c:1, e:"Sự tập trung/chú ý làm nền cho hoạt động nhận thức → trạng thái tâm lý."}
];

let i = 0, answered = new Array(QS.length).fill(null), correct = 0;

const el = id => document.getElementById(id);

function render(){
  el("result").style.display = "none";
  el("q-text").parentElement.querySelectorAll("#sec-badge,#q-text,#opts").forEach(x=>x.style.display="");
  document.querySelector("#quiz-root > div:nth-last-child(2)").style.display="flex";
  const Q = QS[i];
  el("counter").textContent = (i+1)+" / "+QS.length;
  el("prog").style.width = ((i+1)/QS.length*100)+"%";
  el("score").textContent = "Đúng: "+correct;
  el("sec-badge").textContent = Q.s;
  el("q-text").textContent = (i+1)+". "+Q.q;
  el("prev-btn").style.opacity = i===0 ? ".4" : "1";
  el("next-btn").textContent = i===QS.length-1 ? "Xem kết quả" : "Câu sau →";

  const wrap = el("opts"); wrap.innerHTML="";
  Q.o.forEach((opt,idx)=>{
    const b = document.createElement("button");
    b.textContent = String.fromCharCode(65+idx)+". "+opt;
    b.style.cssText = "text-align:left; padding:11px 14px; font-size:14px; line-height:1.5; border-radius:var(--border-radius-md);";
    const picked = answered[i];
    if(picked!==null){
      b.disabled = true;
      if(idx===Q.c){ b.style.background="var(--color-background-success)"; b.style.borderColor="var(--color-border-success)"; b.style.color="var(--color-text-success)"; }
      else if(idx===picked){ b.style.background="var(--color-background-danger)"; b.style.borderColor="var(--color-border-danger)"; b.style.color="var(--color-text-danger)"; }
      else { b.style.opacity=".55"; }
    } else {
      b.onclick = ()=>choose(idx);
    }
    wrap.appendChild(b);
  });

  const ex = el("explain");
  if(answered[i]!==null){
    const ok = answered[i]===Q.c;
    ex.style.display="block";
    ex.innerHTML = "<span style='font-weight:500; color:"+(ok?"var(--color-text-success)":"var(--color-text-danger)")+"'>"+(ok?"✓ Chính xác. ":"✗ Chưa đúng. ")+"</span>"+Q.e;
  } else { ex.style.display="none"; }
}

function choose(idx){
  if(answered[i]!==null) return;
  answered[i]=idx;
  if(idx===QS[i].c) correct++;
  render();
}

function showResult(){
  document.querySelector("#quiz-root > div:nth-last-child(2)").style.display="none";
  el("sec-badge").style.display="none"; el("q-text").style.display="none"; el("opts").style.display="none"; el("explain").style.display="none";
  el("prog").style.width="100%"; el("counter").textContent=QS.length+" / "+QS.length; el("score").textContent="Đúng: "+correct;
  const r = el("result"); r.style.display="block";
  const pct = Math.round(correct/QS.length*100);
  el("final-score").textContent = correct+" / "+QS.length+"  ("+pct+"%)";
  let msg = pct>=85 ? "Xuất sắc! Bạn nắm rất chắc Chương 1." : pct>=65 ? "Khá tốt — ôn lại vài câu sai là ổn." : "Cần ôn lại kỹ phần lý thuyết, nhất là phân loại.";
  el("final-msg").textContent = msg;
}

el("next-btn").onclick = ()=>{ if(i===QS.length-1){ showResult(); } else { i++; render(); } };
el("prev-btn").onclick = ()=>{ if(i>0){ i--; render(); } };
el("retry-btn").onclick = ()=>{ i=0; correct=0; answered=new Array(QS.length).fill(null); render(); };
el("review-btn").onclick = ()=>{ const w=answered.map((a,k)=>a!==QS[k].c?k:-1).filter(k=>k>=0); if(w.length){ i=w[0]; render(); } };

render();
</script>
